{% extends "base.html" %}
{% set title = "Register | GCS File Portal" %}

{% block content %}
<section class="auth-panel">
  <div>
    <p class="eyebrow">Create account</p>
    <h1>Register</h1>
    <p class="lede">Create a login account to access the secure file portal.</p>
  </div>

  <form class="card login-card" method="post">
    <label>
      Username
      <input name="username" type="text" autocomplete="username" minlength="3" required>
    </label>
    <label>
      Password
      <input name="password" type="password" autocomplete="new-password" minlength="6" required>
    </label>
    <label>
      Confirm password
      <input name="confirm_password" type="password" autocomplete="new-password" minlength="6" required>
    </label>
    <button type="submit">Create account</button>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </form>
</section>
{% endblock %}
